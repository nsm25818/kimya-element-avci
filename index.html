<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Avcısı - Kesin Çözüm</title>
    <!-- İlk koddaki çalışan kütüphane yöntemi -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: white; padding: 20px; }
        #soru-alani { background: #16213e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #0f3460; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 10px; overflow: hidden; }
        #bildirim { font-size: 1.2rem; margin: 15px; font-weight: bold; min-height: 30px; }
        .dogru { color: #4ee44e; }
        .yanlis { color: #ff4d4d; }
        .skor { color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>KİMYA ELEMENT AVCISI</h1>
    
    <div id="soru-alani">
        <h2 id="soru-metni">Yükleniyor...</h2>
    </div>

    <!-- QR Okuyucu Buraya Gelecek -->
    <div id="reader"></div>
    
    <div id="bildirim">QR Kodu Okutun</div>
    <div class="skor">Puan: <span id="puan">0</span> | Kalan Soru: <span id="kalan">0</span></div>

    <script>
        // Geniş Soru Havuzu
        let soruHavuzu = [
            { s: "Evrenin en hafif ve ilk elementi nedir?", c: "hidrojen" },
            { s: "Uçan balonlarda kullanılan yanıcı olmayan soygaz hangisidir?", c: "helyum" },
            { s: "Türkiye'nin dünyada en çok rezerve sahip olduğu (boraks) elementi?", c: "bor" },
            { s: "Yaşam için soluduğumuz temel gaz hangisidir?", c: "oksijen" },
            { s: "Mutfak tuzunun (NaCl) yapısındaki metal hangisidir?", c: "sodyum" },
            { s: "Kemik ve dişlerin yapısında bulunan temel metal hangisidir?", c: "kalsiyum" },
            { s: "Barut yapımında kullanılan sarı renkli ametal?", c: "kukur" },
            { s: "Elektrik iletiminde kullanılan turuncumsu metal hangisidir?", c: "bakir" },
            { s: "Mıknatıs tarafından çekilen, inşaatların ana metali?", c: "demir" },
            { s: "Pillerde kullanılan en hafif metal?", c: "lityum" },
            { s: "Cips paketlerine tazeliği korumak için basılan gaz?", c: "azot" },
            { s: "Termometrelerde kullanılan tek sıvı metal?", c: "civa" },
            { s: "Mutfak folyosu yapımında kullanılan hafif metal?", c: "aluminyum" },
            { s: "Elmas ve kurşun kalemin yapısındaki element?", c: "karbon" },
            { s: "Çok değerli, paslanmayan sarı renkli takı metali?", c: "altin" },
            { s: "Işıklı tabelalarda kullanılan turuncu soygaz?", c: "neon" },
            { s: "Kibrit ucu yapımında kullanılan element?", c: "fosfor" },
            { s: "Çeliklerin kaplanmasında (galvaniz) kullanılan metal?", c: "cinko" }
        ];

        let guncelSoru = {};
        let puan = 0;
        let kilitli = false;

        function yeniSoruSec() {
            if (soruHavuzu.length === 0) {
                document.getElementById('soru-metni').innerText = "TEBRİKLER! TÜM SORULAR BİTTİ.";
                document.getElementById('bildirim').innerText = "Sınav Başarıyla Tamamlandı.";
                return;
            }

            kilitli = false;
            document.getElementById('bildirim').innerText = "QR Kod Bekleniyor...";
            document.getElementById('bildirim').className = "";
            document.getElementById('kalan').innerText = soruHavuzu.length;
            
            let index = Math.floor(Math.random() * soruHavuzu.length);
            guncelSoru = soruHavuzu.splice(index, 1)[0]; 
            document.getElementById('soru-metni').innerText = guncelSoru.s;
        }

        function onScanSuccess(decodedText) {
            if (kilitli) return;

            let okunan = decodedText.toLowerCase().trim();
            
            if (okunan === guncelSoru.c) {
                kilitli = true;
                puan += 10;
                document.getElementById('puan').innerText = puan;
                document.getElementById('bildirim').innerText = "DOĞRU! ✅";
                document.getElementById('bildirim').className = "dogru";
                
                // 2 saniye sonra otomatik yeni soru
                setTimeout(yeniSoruSec, 2000);
            } else {
                document.getElementById('bildirim').innerText = "YANLIŞ! TEKRAR DENE ❌";
                document.getElementById('bildirim').className = "yanlis";
                // Yanlışta kilitlenmez, okumaya devam eder
            }
        }

        // İLK KODDAKİ ÇALIŞAN BAŞLATICI
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: {width: 250, height: 250},
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            /* verbose= */ false
        );

        html5QrcodeScanner.render(onScanSuccess);
        
        // İlk soruyu başlat
        yeniSoruSec();
    </script>
</body>
</html>
