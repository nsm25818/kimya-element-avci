<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Element Sınavı</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f172a; color: #f8fafc; padding: 20px; }
        #soru-konteynir { background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid #384455; margin-bottom: 15px; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        #soru-metni { font-size: 1.4rem; line-height: 1.5; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 4px solid #334155; border-radius: 20px; overflow: hidden; }
        #bildirim { font-size: 1.2rem; margin: 15px; font-weight: bold; min-height: 40px; }
        .dogru { color: #22c55e; }
        .yanlis { color: #ef4444; }
        #istatistik { font-size: 1rem; color: #94a3b8; margin-top: 10px; }
        button { padding: 12px 25px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; display: none; margin: 10px auto; }
    </style>
</head>
<body>

    <h1>KİMYA SINAV MODU</h1>

    <div id="soru-konteynir">
        <p id="soru-metni">Yükleniyor...</p>
    </div>

    <div id="reader"></div>

    <div id="bildirim">QR Kod Bekleniyor...</div>
    <div id="istatistik">Puan: <span id="puan">0</span> | Kalan Soru: <span id="kalan">0</span></div>
    <button id="sonraki-btn" onclick="yeniSoruSec()">Sonraki Soru ➔</button>

    <script>
        // DEV SORU HAVUZU
        let soruHavuzu = [
            { s: "Evrenin en hafif ve ilk elementi nedir?", c: "hidrojen" },
            { s: "Uçan balonlarda kullanılan yanıcı olmayan soygaz hangisidir?", c: "helyum" },
            { s: "Türkiye'nin dünyada en çok rezerve sahip olduğu (boraks) elementi?", c: "bor" },
            { s: "Yaşam için soluduğumuz temel gaz hangisidir?", c: "oksijen" },
            { s: "Mutfak tuzunun (NaCl) yapısındaki metal hangisidir?", c: "sodyum" },
            { s: "Kemik ve dişlerin yapısında bulunan temel metal hangisidir?", c: "kalsiyum" },
            { s: "Barut ve sülfürik asit yapımında kullanılan sarı renkli ametal?", c: "kukur" },
            { s: "Elektrik iletiminde kullanılan turuncumsu metal hangisidir?", c: "bakir" },
            { s: "Mıknatıs tarafından çekilen, inşaatların ana metal elementi?", c: "demir" },
            { s: "Pillerde ve şarjlı bataryalarda kullanılan en hafif metal?", c: "lityum" },
            { s: "Cips paketlerine tazeliği korumak için basılan gaz?", c: "azot" },
            { s: "Termometrelerde kullanılan, oda koşullarında sıvı olan metal?", c: "civa" },
            { s: "Mutfak folyosu ve içecek kutularında kullanılan hafif metal?", c: "aluminyum" },
            { s: "Yüzme havuzlarını dezenfekte etmek için kullanılan element?", c: "klor" },
            { s: "Elmas ve kurşun kalemin yapısındaki temel element?", c: "karbon" },
            { s: "Çok değerli, paslanmayan sarı renkli takı metali?", c: "altin" },
            { s: "Işıklı reklam tabelalarında kullanılan turuncu soygaz?", c: "neon" },
            { s: "Kibrit ucu yapımında ve suni gübrelerde kullanılan element?", c: "fosfor" },
            { s: "Yarı iletkenlerde ve cam sanayiinde kullanılan element?", c: "silisyum" },
            { s: "Paslanmaz çelik yapımında ve mutfak gereçlerinde kullanılır?", c: "krom" },
            { s: "Kıymetli bir metal, fotoğrafçılıkta ve takıda kullanılır?", c: "gumus" },
            { s: "Çeliklerin kaplanmasında (galvaniz) kullanılan metal?", c: "cinko" },
            { s: "Havalimanı güvenliğinde ve radyasyon kalkanlarında kullanılan ağır metal?", c: "kursun" },
            { s: "Deniz ürünlerinde ve tentürdiyot yapımında kullanılan ametal?", c: "iyot" }
        ];

        let guncelSoru = {};
        let puan = 0;
        let bekliyor = false;

        function yeniSoruSec() {
            if (soruHavuzu.length === 0) {
                document.getElementById('soru-metni').innerText = "TEBRİKLER! TÜM SORULARI BİTİRDİNİZ.";
                document.getElementById('bildirim').innerText = "Sınav Tamamlandı.";
                return;
            }

            bekliyor = false;
            document.getElementById('bildirim').innerText = "QR Kodu Okutun...";
            document.getElementById('bildirim').className = "";
            document.getElementById('sonraki-btn').style.display = "none";
            document.getElementById('kalan').innerText = soruHavuzu.length;

            // Rastgele bir soru seç ve havuzdan çıkar
            let index = Math.floor(Math.random() * soruHavuzu.length);
            guncelSoru = soruHavuzu.splice(index, 1)[0];

            document.getElementById('soru-metni').innerText = guncelSoru.s;
        }

        function onScanSuccess(decodedText) {
            if (bekliyor) return;

            let okunan = decodedText.toLowerCase().trim();
            let bildirim = document.getElementById('bildirim');

            if (okunan === guncelSoru.c) {
                bekliyor = true;
                puan += 10;
                document.getElementById('puan').innerText = puan;
                bildirim.innerText = "DOĞRU! 🎉";
                bildirim.className = "dogru";

                if (soruHavuzu.length > 0) {
                    setTimeout(yeniSoruSec, 2000);
                } else {
                    bildirim.innerText = "SINAV BİTTİ, TAM PUAN!";
                }
            } else {
                bildirim.innerText = "YANLIŞ! TEKRAR DENE ❌";
                bildirim.className = "yanlis";
                setTimeout(() => {
                    if(!bekliyor) bildirim.innerText = "Doğru Kartı Bekliyorum...";
                }, 1500);
            }
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
        window.onload = yeniSoruSec;
    </script>
</body>
</html>
